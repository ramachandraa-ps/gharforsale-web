<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — GharForSale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%234A90E2'/><text x='50' y='68' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>G</text></svg>">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="toast-container" id="toast-container"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span>Ghar</span>ForSale</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="favorites.html" class="nav-link">Favorites</a>
      <a href="profile.html" class="nav-link active">Profile</a>
    </div>
    <div class="auth-section">
      <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
    </div>
  </nav>
  <div class="navbar-spacer"></div>

  <div class="profile-page">
    <div class="container">
      <!-- Profile Header -->
      <div class="profile-header" id="profile-header">
        <div class="profile-avatar-placeholder" id="profile-avatar"></div>
        <div class="profile-info">
          <div class="profile-name" id="profile-name">Loading...</div>
          <div class="profile-email" id="profile-email"></div>
          <span class="role-badge" id="profile-role"></span>
        </div>
        <button class="btn btn-secondary btn-sm" id="edit-toggle-btn">Edit Profile</button>
      </div>

      <!-- Edit Profile Form -->
      <div class="edit-profile-form hidden" id="edit-form">
        <div class="form-group">
          <label class="form-label" for="edit-name">Display Name</label>
          <input type="text" id="edit-name" class="form-input" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-phone">Phone Number</label>
          <input type="tel" id="edit-phone" class="form-input" placeholder="+91 XXXXX XXXXX">
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-address">Address</label>
          <input type="text" id="edit-address" class="form-input" placeholder="Your address">
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="save-profile-btn">Save Changes</button>
          <button class="btn btn-secondary" id="cancel-edit-btn">Cancel</button>
        </div>
      </div>

      <!-- My Listings (Sellers) -->
      <div class="profile-section hidden" id="listings-section">
        <div class="profile-section-title">
          <span>My Listings</span>
        </div>
        <div class="grid-3" id="listings-grid"></div>
      </div>

      <!-- My Favorites (Buyers) -->
      <div class="profile-section hidden" id="favorites-section">
        <div class="profile-section-title">
          <span>My Favorites</span>
        </div>
        <div class="grid-3" id="profile-favorites-grid"></div>
      </div>

      <!-- Sign Out -->
      <div class="profile-signout">
        <button class="btn btn-danger" id="signout-btn" style="width:100%">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav (Mobile) -->
  <div class="bottom-nav">
    <div class="bottom-nav-items">
      <a href="index.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="filter.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span>Filter</span>
      </a>
      <a href="add-property.html" class="bottom-nav-item add-btn hidden" id="mobile-add-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="favorites.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Favorites</span>
      </a>
      <a href="profile.html" class="bottom-nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </div>
  </div>

  <script type="module">
    import { requireAuth, getCurrentUser, getCurrentUserData, handleSignOut } from './js/auth.js';
    import { updateUserProfile } from './js/profile.js';
    import { fetchPropertiesByOwner, deleteProperty } from './js/properties.js';
    import { getFavorites } from './js/favorites.js';
    import { createPropertyCard, showToast, showLoader, hideLoader, escapeHtml } from './js/ui.js';

    requireAuth(async (user, userData) => {
      if (userData && userData.role === 'seller') {
        document.getElementById('mobile-add-btn').classList.remove('hidden');
      }

      renderProfileHeader(user, userData);

      if (userData && userData.role === 'seller') {
        await loadListings(user.uid);
      } else {
        await loadFavorites(user.uid);
      }
    });

    function renderProfileHeader(user, userData) {
      const avatarEl = document.getElementById('profile-avatar');
      const nameEl = document.getElementById('profile-name');
      const emailEl = document.getElementById('profile-email');
      const roleEl = document.getElementById('profile-role');

      const displayName = userData?.displayName || user.displayName || 'User';
      const email = user.email || '';
      const role = userData?.role || 'buyer';
      const photoURL = user.photoURL || '';
      const initial = displayName.charAt(0).toUpperCase();

      if (photoURL) {
        avatarEl.outerHTML = `<img src="${escapeHtml(photoURL)}" alt="" class="profile-avatar" referrerpolicy="no-referrer">`;
      } else {
        avatarEl.textContent = initial;
      }

      nameEl.textContent = displayName;
      emailEl.textContent = email;
      roleEl.textContent = role.charAt(0).toUpperCase() + role.slice(1);
      roleEl.className = `role-badge ${role}`;

      // Pre-fill edit form
      document.getElementById('edit-name').value = userData?.displayName || user.displayName || '';
      document.getElementById('edit-phone').value = userData?.phoneNumber || '';
      document.getElementById('edit-address').value = userData?.address || '';
    }

    async function loadListings(uid) {
      const section = document.getElementById('listings-section');
      const grid = document.getElementById('listings-grid');
      section.classList.remove('hidden');

      try {
        const listings = await fetchPropertiesByOwner(uid);
        if (listings.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
              <div class="empty-title">No listings yet</div>
              <div class="empty-subtitle">Start listing your properties!</div>
              <a href="add-property.html" class="btn btn-primary">Add Property</a>
            </div>`;
          return;
        }

        listings.forEach(p => {
          const cardHtml = createPropertyCard(p);
          const wrapper = document.createElement('div');
          wrapper.innerHTML = cardHtml;
          const card = wrapper.firstElementChild;

          // Add delete button overlay
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn btn-danger btn-sm';
          deleteBtn.style.cssText = 'position:absolute;bottom:8px;right:8px;z-index:10;padding:6px 12px;font-size:0.75rem';
          deleteBtn.textContent = 'Delete';
          deleteBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (confirm('Are you sure you want to delete this property?')) {
              try {
                await deleteProperty(p.id);
                card.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => card.remove(), 300);
                showToast('Property deleted', 'success');
              } catch (err) {
                showToast('Failed to delete property', 'error');
              }
            }
          });

          card.style.position = 'relative';
          card.appendChild(deleteBtn);
          grid.appendChild(card);
        });
      } catch (err) {
        console.error('Error loading listings:', err);
        showToast('Failed to load listings', 'error');
      }
    }

    async function loadFavorites(uid) {
      const section = document.getElementById('favorites-section');
      const grid = document.getElementById('profile-favorites-grid');
      section.classList.remove('hidden');

      try {
        const favorites = await getFavorites(uid);
        if (favorites.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              <div class="empty-title">No favorites yet</div>
              <div class="empty-subtitle">Browse and save properties you like!</div>
              <a href="index.html" class="btn btn-primary">Browse Properties</a>
            </div>`;
          return;
        }

        favorites.forEach(p => {
          grid.insertAdjacentHTML('beforeend', createPropertyCard(p));
        });
      } catch (err) {
        console.error('Error loading favorites:', err);
      }
    }

    // Edit profile toggle
    const editForm = document.getElementById('edit-form');
    document.getElementById('edit-toggle-btn').addEventListener('click', () => {
      editForm.classList.toggle('hidden');
    });

    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      editForm.classList.add('hidden');
    });

    // Save profile
    document.getElementById('save-profile-btn').addEventListener('click', async () => {
      const user = getCurrentUser();
      if (!user) return;

      const updates = {
        displayName: document.getElementById('edit-name').value.trim(),
        phoneNumber: document.getElementById('edit-phone').value.trim(),
        address: document.getElementById('edit-address').value.trim()
      };

      try {
        await updateUserProfile(user.uid, updates);
        document.getElementById('profile-name').textContent = updates.displayName || 'User';
        editForm.classList.add('hidden');
        showToast('Profile updated successfully', 'success');
      } catch (err) {
        showToast('Failed to update profile: ' + err.message, 'error');
      }
    });

    // Sign out
    document.getElementById('signout-btn').addEventListener('click', handleSignOut);
  </script>
</body>
</html>
