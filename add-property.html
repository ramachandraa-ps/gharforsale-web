<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Property — GharForSale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%234A90E2'/><text x='50' y='68' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>G</text></svg>">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="toast-container" id="toast-container"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span>Ghar</span>ForSale</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="favorites.html" class="nav-link">Favorites</a>
      <a href="profile.html" class="nav-link">Profile</a>
    </div>
    <div class="auth-section">
      <div class="shimmer" style="width:80px;height:32px;border-radius:var(--radius-sm)"></div>
    </div>
  </nav>
  <div class="navbar-spacer"></div>

  <div class="add-property-page">
    <div class="container">
      <div class="form-container">
        <h1>List Your Property</h1>
        <p class="form-subtitle">Fill in the details to list your property on GharForSale</p>

        <form id="property-form">
          <!-- Basic Details -->
          <h3 class="form-section-title">Basic Details</h3>

          <div class="form-group">
            <label class="form-label" for="title">Title *</label>
            <input type="text" id="title" class="form-input" placeholder="e.g., Spacious 3BHK Apartment" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="description">Description *</label>
            <textarea id="description" class="form-textarea" placeholder="Describe your property..." required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="price">Price (₹) *</label>
              <input type="number" id="price" class="form-input" placeholder="e.g., 5000000" min="0" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="area">Area (sqft) *</label>
              <input type="number" id="area" class="form-input" placeholder="e.g., 1200" min="0" required>
            </div>
          </div>

          <!-- Location -->
          <h3 class="form-section-title">Location</h3>

          <div class="form-group">
            <label class="form-label" for="location">Location *</label>
            <input type="text" id="location" class="form-input" placeholder="e.g., Koramangala, Bangalore" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="address">Full Address</label>
            <input type="text" id="address" class="form-input" placeholder="e.g., 123, 5th Cross, Koramangala">
          </div>

          <!-- Property Info -->
          <h3 class="form-section-title">Property Information</h3>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="type">Property Type *</label>
              <select id="type" class="form-select" required>
                <option value="flat">Flat/Apartment</option>
                <option value="house">House</option>
                <option value="villa">Villa</option>
                <option value="plot">Plot</option>
                <option value="commercial">Commercial</option>
                <option value="land">Land</option>
                <option value="farmHouse">Farm House</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="status">Listing Type *</label>
              <select id="status" class="form-select" required>
                <option value="sale">For Sale</option>
                <option value="rent">For Rent</option>
                <option value="lease">For Lease</option>
                <option value="pg">PG/Hostel</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="bedrooms">Bedrooms</label>
              <input type="number" id="bedrooms" class="form-input" placeholder="0" min="0" max="10" value="0">
            </div>
            <div class="form-group">
              <label class="form-label" for="bathrooms">Bathrooms</label>
              <input type="number" id="bathrooms" class="form-input" placeholder="0" min="0" max="10" value="0">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="furnishing">Furnishing</label>
            <select id="furnishing" class="form-select">
              <option value="unfurnished">Unfurnished</option>
              <option value="semiFurnished">Semi Furnished</option>
              <option value="fullyFurnished">Fully Furnished</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="landArea">Land Area (sqft)</label>
              <input type="number" id="landArea" class="form-input" placeholder="Optional" min="0">
            </div>
            <div class="form-group">
              <label class="form-label" for="landRate">Land Rate (₹/sqft)</label>
              <input type="number" id="landRate" class="form-input" placeholder="Optional" min="0">
            </div>
          </div>

          <!-- Amenities -->
          <h3 class="form-section-title">Amenities</h3>
          <div class="amenities-grid" id="amenities-grid"></div>

          <!-- Submit -->
          <div class="form-submit">
            <button type="submit" class="btn btn-primary btn-lg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/></svg>
              List Property
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bottom Nav (Mobile) -->
  <div class="bottom-nav">
    <div class="bottom-nav-items">
      <a href="index.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Home</span>
      </a>
      <a href="filter.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span>Filter</span>
      </a>
      <a href="add-property.html" class="bottom-nav-item add-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </a>
      <a href="favorites.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Favorites</span>
      </a>
      <a href="profile.html" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </div>
  </div>

  <script type="module">
    import { requireRole, getCurrentUser, getCurrentUserData } from './js/auth.js';
    import { createProperty, buildPropertyObject } from './js/properties.js';
    import { showToast, showLoader, hideLoader } from './js/ui.js';

    const AMENITIES = [
      'Parking', 'Lift', 'Security', 'Gym', 'Swimming Pool', 'Garden',
      'Power Backup', 'Water Supply', 'Clubhouse', 'Fire Safety',
      'Intercom', 'Gas Pipeline', 'Visitor Parking', 'Maintenance Staff',
      'CCTV', 'Rain Water Harvesting'
    ];

    // Render amenities checkboxes
    const amenitiesGrid = document.getElementById('amenities-grid');
    AMENITIES.forEach(amenity => {
      const label = document.createElement('label');
      label.className = 'amenity-checkbox';
      label.innerHTML = `<input type="checkbox" value="${amenity}"><span>${amenity}</span>`;
      label.addEventListener('click', () => {
        setTimeout(() => {
          label.classList.toggle('selected', label.querySelector('input').checked);
        }, 0);
      });
      amenitiesGrid.appendChild(label);
    });

    // Auth guard — sellers only
    requireRole('seller', (user, userData) => {
      // User is authenticated as seller
    });

    // Form submission
    document.getElementById('property-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const userData = getCurrentUserData();
      if (!userData) {
        showToast('Please sign in first', 'error');
        return;
      }

      // Collect form data
      const formData = {
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim(),
        price: document.getElementById('price').value,
        area: document.getElementById('area').value,
        location: document.getElementById('location').value.trim(),
        address: document.getElementById('address').value.trim(),
        type: document.getElementById('type').value,
        status: document.getElementById('status').value,
        bedrooms: document.getElementById('bedrooms').value,
        bathrooms: document.getElementById('bathrooms').value,
        furnishing: document.getElementById('furnishing').value,
        landArea: document.getElementById('landArea').value || 0,
        landRate: document.getElementById('landRate').value || 0,
        amenities: Array.from(document.querySelectorAll('#amenities-grid input[type="checkbox"]:checked')).map(cb => cb.value)
      };

      // Validate required fields
      if (!formData.title || !formData.description || !formData.price || !formData.area || !formData.location) {
        showToast('Please fill in all required fields', 'error');
        return;
      }

      showLoader();

      try {
        const propertyData = buildPropertyObject(formData, userData);
        await createProperty(propertyData);
        showToast('Property listed successfully!', 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (err) {
        console.error('Error creating property:', err);
        showToast('Failed to list property: ' + err.message, 'error');
      } finally {
        hideLoader();
      }
    });
  </script>
</body>
</html>
