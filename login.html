<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GharForSale — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="toast-container" id="toast-container"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <h1><span style="color:var(--text-primary)">Ghar</span><span class="text-accent">ForSale</span></h1>
        <p class="text-secondary">Find your dream property</p>
      </div>

      <button class="google-signin-btn" id="google-signin-btn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>

      <p class="text-muted text-sm" style="margin-top:24px">
        By signing in, you agree to our terms of service
      </p>
    </div>
  </div>

  <!-- Role Selection Modal -->
  <div class="modal-overlay hidden" id="role-modal">
    <div class="modal">
      <h2 class="modal-title">Choose Your Role</h2>
      <p class="text-secondary mb-3">How will you use GharForSale?</p>
      <div class="role-cards">
        <div class="role-card" data-role="buyer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <h3>Buyer</h3>
          <p>Browse properties, save favorites, get AI insights</p>
        </div>
        <div class="role-card" data-role="seller">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <h3>Seller</h3>
          <p>List your properties and connect with buyers</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuth, signInWithGoogle, setUserRole, getCurrentUser, getCurrentUserData } from './js/auth.js';
    import { showToast } from './js/ui.js';

    const roleModal = document.getElementById('role-modal');
    const signinBtn = document.getElementById('google-signin-btn');

    // If already logged in with role, redirect to home
    initAuth((user, userData) => {
      if (user && userData && userData.role) {
        window.location.href = 'index.html';
      }
    });

    // Google Sign-In button
    signinBtn.addEventListener('click', async () => {
      signinBtn.disabled = true;
      signinBtn.textContent = 'Signing in...';
      try {
        const { user, userData } = await signInWithGoogle();
        if (userData && userData.role) {
          window.location.href = 'index.html';
        } else {
          // Show role selection modal
          roleModal.classList.remove('hidden');
        }
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showToast('Sign in failed: ' + err.message, 'error');
        }
      } finally {
        signinBtn.disabled = false;
        signinBtn.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign in with Google`;
      }
    });

    // Role selection cards
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', async () => {
        const role = card.dataset.role;
        try {
          await setUserRole(role);
          showToast('Welcome! You are now a ' + role, 'success');
          window.location.href = 'index.html';
        } catch (err) {
          showToast('Failed to set role: ' + err.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
